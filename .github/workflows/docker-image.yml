name: Docker image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_tests:
        description: Run unit tests before publishing
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        if: github.event_name == 'workflow_dispatch' && inputs.run_tests
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Bump minor version and update manifest
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm version minor --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

          node <<'NODE'
          const fs = require('node:fs');
          const path = 'infra/manifests/deployment.yaml';
          const image = `ghcr.io/${process.env.IMAGE_NAME}:${process.env.VERSION}`;
          const manifest = fs.readFileSync(path, 'utf8').replace(
            /image: ghcr\.io\/pedrovmota\/socket-web:[^\s]+/,
            `image: ${image}`
          );
          fs.writeFileSync(path, manifest);
          NODE

          git add package.json infra/manifests/deployment.yaml
          git commit -m "chore: release v${VERSION} [skip ci]"
          git push

      - name: Use current version
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="$(node -p 'require("./package.json").version')"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build and push versioned image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
