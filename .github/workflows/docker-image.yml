name: Docker image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Resolve image version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            npm version minor --no-git-tag-version
            VERSION="$(node -p "require('./package.json').version")"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi

          if [[ -z "${VERSION}" || "${VERSION}" == "undefined" || "${VERSION}" == "null" ]]; then
            echo "Invalid image version: ${VERSION:-<empty>}" >&2
            exit 1
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update manifest
        if: github.ref_type == 'branch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          node <<'NODE'
          const fs = require('node:fs');
          const path = 'infra/manifests/deployment.yaml';
          const image = `ghcr.io/${process.env.IMAGE_NAME}:${process.env.RELEASE_TAG}`;
          if (!process.env.VERSION || process.env.VERSION === 'undefined' || process.env.VERSION === 'null') {
            throw new Error(`Invalid image version: ${process.env.VERSION}`);
          }
          if (!process.env.RELEASE_TAG || process.env.RELEASE_TAG === 'vundefined' || process.env.RELEASE_TAG === 'vnull') {
            throw new Error(`Invalid release tag: ${process.env.RELEASE_TAG}`);
          }
          const manifest = fs.readFileSync(path, 'utf8').replace(
            /image: ghcr\.io\/pedrovmota\/socket-web:[^\s]+/,
            `image: ${image}`
          );
          fs.writeFileSync(path, manifest);
          NODE

          git add package.json infra/manifests/deployment.yaml
          if git diff --cached --quiet; then
            echo "Manifest already points to ${RELEASE_TAG}"
          else
            git commit -m "chore: release ${RELEASE_TAG} [skip ci]"
            git push
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists"
          else
            git tag "${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Build and push tagged image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "${RELEASE_TAG}" || gh release create "${RELEASE_TAG}" --generate-notes
