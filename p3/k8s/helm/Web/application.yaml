apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: socket-web
    app.kubernetes.io/part-of: iot-p3
spec:
  project: default
  source:
    repoURL: https://github.com/PedroVMota/socket-web.git
    targetRevision: main
    path: infra/manifests
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  syncPolicy:
    # automated:
    #   prune: true
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=true
